openapi: 3.2.0
info:
  title: kpblog API
  version: 2.1.0
  description: |
    kpblog 后端 JSON API 契约。

    所有 `/api/*` JSON 接口统一使用 envelope:

    - 成功: `{ "success": true, "data": ... }`
    - 失败: `{ "success": false, "error": { "code": "...", "message": "..." } }`

    Web 浏览器通过同域 `/api/*` 访问；Next.js 将请求代理到独立 Fastify
    进程。`/rss.xml` 等由 Web 输出的非 JSON 内容不包含在本文件中。
servers:
  - url: http://localhost:3001
    description: Local same-origin Web proxy
  - url: http://127.0.0.1:3002
    description: Local Fastify API (private)
  - url: https://kpblog.cc
    description: Production
tags:
  - name: Auth
  - name: Articles
  - name: Comments
  - name: Taxonomy
  - name: Media
  - name: Settings
  - name: Publishing
  - name: Public
  - name: Health

paths:
  /health:
    get:
      tags: [Health]
      summary: Check the independent API process
      servers:
        - url: http://127.0.0.1:3002
          description: Direct Fastify API
      responses:
        "200":
          description: API is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"

  /api/public/settings:
    get:
      tags: [Public]
      summary: Get public blog title and description
      responses:
        "200":
          description: Public settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"

  /api/public/layout:
    get:
      tags: [Public]
      summary: Get public layout tags, recent posts, and settings
      responses:
        "200":
          description: Public layout data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"

  /api/public/article-index:
    get:
      tags: [Public]
      summary: Get the server-rendered article index payload
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated published articles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleListResponse"

  /api/public/articles/{slug}:
    parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Public]
      summary: Get a published article by slug
      responses:
        "200":
          description: Published article or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"

  /api/public/tags/{slug}:
    parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Public]
      summary: Get a tag archive page payload
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Tag metadata and paginated articles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"

  /api/public/categories/{slug}:
    parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Public]
      summary: Get a category archive page payload
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Category metadata and paginated articles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"

  /api/public/rss-data:
    get:
      tags: [Public]
      summary: Get data used by the Web RSS route
      responses:
        "200":
          description: Published posts and public settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"

  /api/public/sitemap-data:
    get:
      tags: [Public]
      summary: Get data used by the Web sitemap route
      responses:
        "200":
          description: Published post, tag, and category identifiers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"

  /api/location/country:
    get:
      tags: [Public]
      summary: Infer a registration country from trusted request headers
      responses:
        "200":
          description: ISO country code when available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"

  /api/auth/login:
    post:
      tags: [Auth]
      summary: User or admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a public user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered and logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/auth/registration-options:
    get:
      tags: [Auth]
      summary: Get the registration methods available in the current environment
      responses:
        "200":
          description: Email and phone registration availability
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistrationOptionsResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/auth/verification-code:
    post:
      tags: [Auth]
      summary: Send an email or phone registration verification code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerificationCodeInput"
      responses:
        "200":
          description: Verification code created and delivered when the selected service is configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationCodeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Clear current session cookie
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated user session
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Current admin user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/auth/key:
    get:
      tags: [Auth]
      summary: Get current admin API key
      security:
        - sessionCookie: []
      responses:
        "200":
          description: API key status. The stored key value is not returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Auth]
      summary: Regenerate current admin API key
      security:
        - sessionCookie: []
      responses:
        "200":
          description: New API key. This is the only time the raw key is returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/articles:
    get:
      tags: [Articles]
      summary: List articles
      description: |
        Public requests return published articles only.
        Authenticated admin requests can pass `published=all` or `published=draft`.
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: tag
          in: query
          schema:
            type: string
          description: Filter by tag slug.
        - name: category
          in: query
          schema:
            type: string
          description: Filter by category slug.
        - name: published
          in: query
          schema:
            type: string
            enum: [all, draft, published]
          description: Admin-only publication filter.
      responses:
        "200":
          description: Paginated articles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleListResponse"
    post:
      tags: [Articles]
      summary: Create article
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArticleCreateInput"
      responses:
        "201":
          description: Article created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostDetailResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/articles/{id}:
    parameters:
      - $ref: "#/components/parameters/Id"
    get:
      tags: [Articles]
      summary: Get article by id
      description: Draft articles require an authenticated admin session.
      responses:
        "200":
          description: Article detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostDetailResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Articles]
      summary: Update article
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArticleUpdateInput"
      responses:
        "200":
          description: Article updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostDetailResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [Articles]
      summary: Delete article
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Article deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/comments:
    get:
      tags: [Comments]
      summary: List comments
      description: |
        With `postId`, returns approved public comment threads for that post.
        Without `postId`, requires an admin session and returns the moderation list.
      parameters:
        - name: postId
          in: query
          schema:
            type: string
        - name: approved
          in: query
          schema:
            type: string
            enum: [pending, approved, "true", "false"]
          description: Admin moderation filter. Ignored when `postId` is provided.
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Public comment threads or admin comment list
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/CommentListResponse"
                  - $ref: "#/components/schemas/AdminCommentListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Comments]
      summary: Submit comment
      description: New comments are created with `pendingReview=true` and are hidden until approved.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentCreateInput"
      responses:
        "201":
          description: Comment submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentCreateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/comments/{id}:
    parameters:
      - $ref: "#/components/parameters/Id"
    put:
      tags: [Comments]
      summary: Approve or reject comment
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentModerationInput"
      responses:
        "200":
          description: Comment updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCommentResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [Comments]
      summary: Delete comment
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Comment deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/categories:
    get:
      tags: [Taxonomy]
      summary: List categories
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryListResponse"

  /api/tags:
    get:
      tags: [Taxonomy]
      summary: List tags
      responses:
        "200":
          description: Tags
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagListResponse"

  /api/settings:
    get:
      tags: [Settings]
      summary: Get public settings
      responses:
        "200":
          description: Settings map
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsResponse"
    put:
      tags: [Settings]
      summary: Update settings
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsUpdateInput"
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/upload:
    post:
      tags: [Media]
      summary: Upload image
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Image uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/images:
    get:
      tags: [Media]
      summary: List uploaded images
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Images
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [Media]
      summary: Delete uploaded image
      security:
        - sessionCookie: []
      parameters:
        - name: file
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Image deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/music:
    get:
      tags: [Media]
      summary: List music tracks
      responses:
        "200":
          description: Music tracks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MusicListResponse"
    post:
      tags: [Media]
      summary: Upload local music file or add external music URL
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/MusicUploadInput"
          application/json:
            schema:
              $ref: "#/components/schemas/MusicUrlInput"
      responses:
        "201":
          description: Music track created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MusicResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/music/{id}:
    parameters:
      - $ref: "#/components/parameters/Id"
    delete:
      tags: [Media]
      summary: Delete music track
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Music track deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/import:
    post:
      tags: [Publishing]
      summary: Import note files
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [files]
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        "201":
          description: Import results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/publish:
    post:
      tags: [Publishing]
      summary: Publish Markdown via API key
      security:
        - bearerApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishInput"
      responses:
        "201":
          description: Published article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: session
    bearerApiKey:
      type: http
      scheme: bearer
      bearerFormat: kp API key

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 50
        default: 10

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiFailure"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiFailure"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiFailure"
    TooManyRequests:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiFailure"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiFailure"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiFailure"
    InternalError:
      description: Internal error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiFailure"

  schemas:
    ApiFailure:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          const: false
        error:
          $ref: "#/components/schemas/ApiError"

    ApiError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [BAD_REQUEST, UNAUTHORIZED, FORBIDDEN, NOT_FOUND, CONFLICT, TOO_MANY_REQUESTS, INTERNAL_ERROR]
        message:
          type: string

    LoginInput:
      type: object
      required: [password]
      properties:
        username:
          type: string
        identifier:
          type: string
          description: Username, email, or E.164-style phone number.
        email:
          type: string
          format: email
        phone:
          type: string
          pattern: "^\\+[1-9][0-9]{6,14}$"
        password:
          type: string
          format: password

    RegisterInput:
      type: object
      required: [username, verificationChannel, verificationCode, password]
      description: The contact field matching verificationChannel is required.
      properties:
        username:
          type: string
          minLength: 2
          maxLength: 32
        displayName:
          type:
            - string
            - "null"
          maxLength: 32
        email:
          type:
            - string
            - "null"
          format: email
        phone:
          type:
            - string
            - "null"
          pattern: "^\\+[1-9][0-9]{6,14}$"
        verificationChannel:
          type: string
          enum: [email, phone]
        verificationCode:
          type: string
          pattern: "^\\d{6}$"
        password:
          type: string
          format: password
          minLength: 8

    VerificationCodeInput:
      type: object
      required: [channel, target]
      properties:
        channel:
          type: string
          enum: [email, phone]
        target:
          type: string
          description: Email address or E.164-style phone number matching channel.

    VerificationCodeResponse:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              required: [sent, channel, target, expiresAt]
              properties:
                sent:
                  type: boolean
                  description: True when a message was delivered; false only in development fallback mode.
                channel:
                  type: string
                  enum: [email, phone]
                target:
                  type: string
                expiresAt:
                  type: string
                  format: date-time
                debugCode:
                  type: string
                  description: Returned only in development when the selected delivery service is not configured.

    RegistrationOptionsResponse:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              required: [email, phone]
              properties:
                email:
                  type: boolean
                phone:
                  type: boolean

    SessionUser:
      type: object
      required: [authenticated, username, displayName, role]
      properties:
        authenticated:
          type: boolean
          const: true
        username:
          type: string
        displayName:
          type:
            - string
            - "null"
        role:
          type: string
          enum: [ADMIN, USER]

    LoginResponse:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              required: [loggedIn, user]
              properties:
                loggedIn:
                  type: boolean
                  const: true
                user:
                  $ref: "#/components/schemas/SessionUser"

    LogoutResponse:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              required: [loggedOut]
              properties:
                loggedOut:
                  type: boolean
                  const: true

    AuthMeResponse:
